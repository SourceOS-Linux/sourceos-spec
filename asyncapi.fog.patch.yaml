# Additive AsyncAPI patch fragment for the Fog Layer.
# Merge this file into asyncapi.yaml at build time using @asyncapi/bundler.
# All channels use Kafka with the same broker configuration as the base spec.

channels:
  srcos.v2.fog.topic.events:
    description: Events emitted when a FogVault topic is recorded or updated.
    bindings:
      kafka:
        topic: srcos.v2.fog.topic.events
        partitions: 3
        replicas: 3
        topicConfiguration:
          retention.ms: 2592000000
          cleanup.policy: delete
    publish:
      operationId: publishFogTopicEvent
      summary: Publish a fog topic domain event
      description: Publishes an event whenever a FogVault Topic is upserted.
      message:
        name: FogTopicEvent
        title: Fog Topic Domain Event
        summary: A change event for a FogVault Topic.
        description: |
          The `eventType` in the payload envelope identifies the specific change:
          - `FogTopicUpserted`
        contentType: application/json
        payload: { $ref: './schemas/EventEnvelope.json' }
        bindings:
          kafka:
            key:
              type: string
              description: The `objectId` URN of the Topic.

