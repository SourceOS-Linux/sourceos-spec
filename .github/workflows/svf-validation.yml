name: SVF Validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  sourceos-svf-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate SourceOS SVF contracts
        run: make validate-svf-contracts
