        '403':
          description: Authenticated subject is not permitted to create ratings.
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
        '422':
          description: Request body is valid JSON but fails schema validation.
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

